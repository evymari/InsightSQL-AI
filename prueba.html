<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stream Viewer</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; line-height: 1.5; }
        #response-container { 
            border: 1px solid #ccc; 
            padding: 1rem; 
            min-height: 100px; 
            background-color: #f9f9f9;
            white-space: pre-wrap; /* Mantiene saltos de línea */
            border-radius: 8px;
        }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: #007bff; margin-left: 2px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <h2>AI Chat Stream</h2>
    <p>Consumiendo: <code>http://0.0.0.0:8000/api/chat</code></p>
    
    <button id="start-btn">Consultar Ventas 2017</button>
    <hr>
    
    <div id="response-container">Esperando respuesta...</div>

    <script>
        const btn = document.getElementById('start-btn');
        const container = document.getElementById('response-container');

        btn.addEventListener('click', async () => {
            // Resetear interfaz
            container.innerHTML = 'Conectando...<span class="cursor"></span>';
            btn.disabled = true;
            let fullText = "";

            try {
                const response = await fetch('https://musical-memory-jjpxq7rgrr6fq9j5-8000.app.github.dev/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify({
                        "message": "Cuáles fueron las ventas totales por mes en 2017?",
                        "session_id": "121",
                        "role": "analyst"
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                container.innerHTML = ""; // Limpiar el "Conectando..."

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    
                    // Procesar el formato SSE (quitar prefijos "data: " si existen)
                    const lines = chunk.split('\n');
                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            const content = line.replace('data: ', '');
                            // Si tu backend envía JSON puro en el data, lo acumulamos
                            fullText += content;
                        } else if (line.trim() !== "") {
                            // Si el backend envía texto plano sin prefijo "data:"
                            fullText += line;
                        }
                    });

                    // Actualizar el HTML con el texto acumulado + cursor
                    container.innerHTML = fullText + '<span class="cursor"></span>';
                }

            } catch (error) {
                container.innerText = "Error: " + error.message;
            } finally {
                btn.disabled = false;
                // Quitar cursor al terminar
                container.innerHTML = fullText;
            }
        });
    </script>
</body>
</html>
